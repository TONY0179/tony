[item.tipo] || ICONS['Default']).replace('h-6 w-6', 'h-8 w-8')} </div> <div> <h2 class="text-2xl font-bold text-gray-900 dark:text-white">${item.nombre}</h2> <p class="text-sm text-gray-500 dark:text-gray-400">${item.dominio}</p> </div> </div> <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"> <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg> </button> </div> <div class="mt-6 border-t border-gray-200 dark:border-gray-700 pt-6"> <p class="text-gray-700 dark:text-gray-300">${item.descripcion}</p> <div class="mt-6 grid grid-cols-1 md:grid-cols-2 gap-4 text-sm"> <div class="bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg"> <p class="font-semibold text-gray-600 dark:text-gray-300">Patrocinador</p> <p class="text-gray-800 dark:text-gray-100">${item.patrocinador}</p> </div> <div class="bg-gray-50 dark:bg-gray-700/50 p-4 rounded-lg"> <p class="font-semibold text-gray-600 dark:text-gray-300">Owner</p> <p class="text-gray-800 dark:text-gray-100">${item.owner}</p> </div> </div> <div class="mt-4"> <p class="font-semibold text-gray-600 dark:text-gray-300 text-sm">Tags</p> <div class="mt-2 flex flex-wrap gap-2"> ${item.tags.map(tag => <span class="px-3 py-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 rounded-full text-xs">${tag}</span>).join('')} </div> </div> </div> </div> <div class="bg-gray-50 dark:bg-gray-900/50 px-8 py-4 flex flex-col sm:flex-row gap-3 justify-end border-t border-gray-200 dark:border-gray-700"> <button id="copy-link-btn" class="flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600"> <svg xmlns="http://www.w3.org shboard); }); modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); }); document.addEventListener('DOMContentLoaded', () => { renderFilters(); renderDashboards(); }); </script> </body> </html>
